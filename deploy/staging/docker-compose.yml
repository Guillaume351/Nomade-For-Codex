name: nomade-staging

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nomade}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nomade}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - nomade_staging_postgres:/var/lib/postgresql/data

  saas:
    image: ${SAAS_IMAGE:-ghcr.io/CHANGE_ME/nomade-for-codex-saas}:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: 8080
      COMPAT_BACKEND_PORT: 8090
      COMPAT_BACKEND_URL: ${COMPAT_BACKEND_URL:-http://127.0.0.1:8090}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nomade}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:?set INTERNAL_GATEWAY_SECRET}
      PREVIEW_BASE_DOMAIN: ${PREVIEW_BASE_DOMAIN:-preview.localhost}
      PREVIEW_BASE_ORIGIN: ${PREVIEW_BASE_ORIGIN:-https://preview.localhost}
      APP_BASE_URL: ${APP_BASE_URL:-https://app.example.com}
      ACCESS_TOKEN_TTL_SEC: ${ACCESS_TOKEN_TTL_SEC:-900}
      REFRESH_TOKEN_TTL_SEC: ${REFRESH_TOKEN_TTL_SEC:-2592000}
      DEVICE_CODE_TTL_SEC: ${DEVICE_CODE_TTL_SEC:-600}
      PAIRING_CODE_TTL_SEC: ${PAIRING_CODE_TTL_SEC:-600}
      FREE_MAX_AGENTS: ${FREE_MAX_AGENTS:-1}
      PAID_MAX_AGENTS: ${PAID_MAX_AGENTS:-10}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      AUTH_EMAIL_MODE: ${AUTH_EMAIL_MODE:-log}
      AUTH_DEBUG_LOGS: ${AUTH_DEBUG_LOGS:-false}
      HTTP_ACCESS_LOGS: ${HTTP_ACCESS_LOGS:-true}
      AUTH_SMTP_HOST: ${AUTH_SMTP_HOST:-}
      AUTH_SMTP_PORT: ${AUTH_SMTP_PORT:-587}
      AUTH_SMTP_SECURE: ${AUTH_SMTP_SECURE:-false}
      AUTH_SMTP_USER: ${AUTH_SMTP_USER:-}
      AUTH_SMTP_PASS: ${AUTH_SMTP_PASS:-}
      AUTH_SMTP_FROM: ${AUTH_SMTP_FROM:-Nomade <no-reply@example.com>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SAAS_PORT:-8080}:8080"

  tunnel-gateway:
    image: ${TUNNEL_GATEWAY_IMAGE:-ghcr.io/CHANGE_ME/nomade-for-codex-tunnel-gateway}:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: 8081
      CONTROL_API_URL: ${CONTROL_API_URL:-http://saas:8090}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:?set INTERNAL_GATEWAY_SECRET}
      PREVIEW_BASE_DOMAIN: ${PREVIEW_BASE_DOMAIN:-preview.localhost}
    depends_on:
      saas:
        condition: service_started
    ports:
      - "${TUNNEL_GATEWAY_PORT:-8081}:8081"

volumes:
  nomade_staging_postgres:
