services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nomade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nomade"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - nomade_dev_postgres:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  control-api:
    image: node:24-alpine
    working_dir: /workspace
    command: >
      sh -c "npm install &&
             npm --workspace packages/shared run build &&
             npm --workspace services/control-api exec tsx src/index.ts"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/nomade
      JWT_SECRET: ${JWT_SECRET:-dev_local_jwt_secret_please_rotate_123456}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-dev_local_gateway_secret_please_rotate_123456}
      PREVIEW_BASE_DOMAIN: ${PREVIEW_BASE_DOMAIN:-preview.localhost}
      PREVIEW_BASE_ORIGIN: ${PREVIEW_BASE_ORIGIN:-http://preview.localhost:8081}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      ACCESS_TOKEN_TTL_SEC: ${ACCESS_TOKEN_TTL_SEC:-900}
      REFRESH_TOKEN_TTL_SEC: ${REFRESH_TOKEN_TTL_SEC:-2592000}
      DEVICE_CODE_TTL_SEC: ${DEVICE_CODE_TTL_SEC:-600}
      PAIRING_CODE_TTL_SEC: ${PAIRING_CODE_TTL_SEC:-600}
      FREE_MAX_AGENTS: ${FREE_MAX_AGENTS:-1}
      PAID_MAX_AGENTS: ${PAID_MAX_AGENTS:-10}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      AUTH_EMAIL_MODE: ${AUTH_EMAIL_MODE:-log}
      AUTH_DEBUG_LOGS: ${AUTH_DEBUG_LOGS:-true}
      AUTH_SMTP_HOST: ${AUTH_SMTP_HOST:-mailpit}
      AUTH_SMTP_PORT: ${AUTH_SMTP_PORT:-1025}
      AUTH_SMTP_SECURE: ${AUTH_SMTP_SECURE:-false}
      AUTH_SMTP_USER: ${AUTH_SMTP_USER:-}
      AUTH_SMTP_PASS: ${AUTH_SMTP_PASS:-}
      AUTH_SMTP_FROM: ${AUTH_SMTP_FROM:-Nomade <no-reply@example.com>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    ports:
      - "8080:8080"
    volumes:
      - ../..:/workspace
      - control_api_node_modules:/workspace/node_modules

  tunnel-gateway:
    image: node:24-alpine
    working_dir: /workspace
    command: >
      sh -c "npm install &&
             npm --workspace services/tunnel-gateway exec tsx src/index.ts"
    environment:
      PORT: 8081
      CONTROL_API_URL: http://control-api:8080
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-dev_local_gateway_secret_please_rotate_123456}
      PREVIEW_BASE_DOMAIN: ${PREVIEW_BASE_DOMAIN:-preview.localhost}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      control-api:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ../..:/workspace
      - tunnel_gateway_node_modules:/workspace/node_modules

volumes:
  nomade_dev_postgres:
  control_api_node_modules:
  tunnel_gateway_node_modules:
